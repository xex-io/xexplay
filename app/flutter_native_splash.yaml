flutter_native_splash:
  color: "#0A0E1A"
  image: "assets/icons/splash_logo.png"

  # Android 12+ splash screen settings
  android_12:
    color: "#0A0E1A"
    icon_background_color: "#0A0E1A"
    image: "assets/icons/splash_logo.png"

  # iOS settings
  ios: true

  # Keep splash on screen while app initializes (use FlutterNativeSplash.remove())
  android: true
