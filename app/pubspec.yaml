name: xexplay
description: "XEX Play — Card-based sports prediction game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0
  flutter_secure_storage: ^10.0.0
  intl: any
  flutter_card_swiper: ^7.0.1
  web_socket_channel: ^3.0.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.4.2
  firebase_crashlytics: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: any
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6
  dart_jsonwebtoken: ^2.14.0

flutter:
  uses-material-design: true
  generate: true
