# Dependabot configuration for XEX Play monorepo.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2

updates:
  # Go modules — backend service
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    # Auto-merge patch updates
    groups:
      patch-updates:
        update-types:
          - patch

  # npm — admin panel (Next.js)
  - package-ecosystem: npm
    directory: /admin
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - admin
    groups:
      patch-updates:
        update-types:
          - patch

  # pub (Flutter/Dart) — mobile app
  - package-ecosystem: pub
    directory: /app
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - app
    groups:
      patch-updates:
        update-types:
          - patch

  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      patch-updates:
        update-types:
          - patch
